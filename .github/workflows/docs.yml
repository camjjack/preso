name: Docs

# Build the mdBook user guide and publish it to GitHub Pages. Enable Pages
# once in repo Settings → Pages → "GitHub Actions" for the deploy to work.
on:
  push:
    branches: [main]
    paths:
      - "docs/guide/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest
      - run: mdbook build docs/guide
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/guide/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
