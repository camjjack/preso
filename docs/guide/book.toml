[book]
title = "preso"
description = "User guide for preso — a native markdown presentation app"
authors = ["Cameron Jack"]
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/camjjack/preso"
edit-url-template = "https://github.com/camjjack/preso/edit/main/docs/guide/{path}"

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
